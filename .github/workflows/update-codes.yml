name: Update Gift Codes

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch codes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          python3 fetch_codes.py "$TODAY" "$ANTHROPIC_API_KEY"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codes.json
          git diff --staged --quiet || git commit -m "Update gift codes $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          git push
